{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login | Peer Skill Swap{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-5 shadow-sm border-0">
            <h2 class="fw-bold mb-4 text-center">Welcome Back</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Login</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
