{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile | Peer Skill Swap{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-5 shadow-sm border-0">
            <h2 class="fw-bold mb-4">Edit Profile</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-primary fw-bold px-4">Save Changes</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
