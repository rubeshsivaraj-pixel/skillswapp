{% extends 'base.html' %}
{% block title %}Delete Video - SkillSwap{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:520px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4 text-center">
            <div class="mb-3">
                <i class="bi bi-trash3-fill text-danger" style="font-size:3rem;"></i>
            </div>
            <h5 class="fw-bold mb-1">Delete this video?</h5>
            <p class="text-muted mb-0">
                <strong>{{ video.title }}</strong>
            </p>
            <p class="text-muted small mt-1">This action cannot be undone. The video file will be permanently removed.</p>
            <div class="d-flex gap-3 justify-content-center mt-4">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Yes, delete</button>
                </form>
                <a href="{% url 'upload_video' %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
