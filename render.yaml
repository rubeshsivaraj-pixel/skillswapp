services:
  - type: web
    name: skillswapp
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: "bash build.sh"
    startCommand: "gunicorn --workers 3 --bind 0.0.0.0:$PORT peer_skill_swap.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        scope: runtime
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: skillswapp_db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://skillswapp.onrender.com"
      - key: PORT
        value: "10000"

databases:
  - name: skillswapp_db
    databaseName: skillswapp_db
    user: skillswapp_user
    region: singapore
    plan: free
